name: Unit Tests CI

# Menjalankan alur kerja otomatis setiap ada push atau PR ke branch main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    # Menggunakan OS Ubuntu karena jauh lebih cepat dan hemat antrean di GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode sumber dari repositori
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Menyiapkan environment Python 3.12
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Mempercepat proses dengan caching package

      # 3. Menginstal package beserta dependencies khusus development
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      # 4. Mengeksekusi unit test menggunakan Pytest
      - name: Run Pytest
        run: |
          python -m pytest -v ./tests/